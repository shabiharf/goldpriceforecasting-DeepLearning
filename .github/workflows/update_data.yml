name: Update Gold Price Data

# Kapan robot jalan
on:
  schedule:
    # Setiap hari jam 01:00 UTC (= 08:00 WIB)
    - cron: '0 1 * * *'
  workflow_dispatch:  # Bisa juga di-trigger manual dari tab Actions

# Permission untuk push ke repo
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas yfinance curl_cffi

      - name: Fetch latest data
        run: python scripts/fetch_data.py

      - name: Commit and push if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/historical_data.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: refresh gold price data [skip ci]"
            git push
          fi
